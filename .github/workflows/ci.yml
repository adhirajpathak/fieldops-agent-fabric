name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev,gcp]"
      - name: Ingest knowledge base
        run: LLM_PROVIDER=mock fieldops-ingest
      - name: Unit tests
        run: LLM_PROVIDER=mock pytest -q
      - name: Eval pipeline
        run: LLM_PROVIDER=mock fieldops-eval
